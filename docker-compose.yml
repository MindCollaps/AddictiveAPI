services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      APP_ENV: production
      DATABASE_PATH: /app/data/app.db
      JWT_SECRET: change-me-in-production
      JWT_ISSUER: addictiveapi
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5